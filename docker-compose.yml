# Local Postgres for development/testing.
# Neon is used in staging/production via DATABASE_URL.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: nq
      POSTGRES_PASSWORD: nq
      POSTGRES_DB: nq
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nq"]
      interval: 5s
      timeout: 5s
      retries: 5
