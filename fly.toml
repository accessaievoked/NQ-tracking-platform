app = "nq-tracking-platform"
primary_region = "iad"

[build]

[deploy]
  release_command = "alembic upgrade head"

[env]
  APP_ENV = "production"
  APP_BASE_URL = "https://nq-tracking-platform.fly.dev"
  EXPOSE_MAGIC_LINK_URL = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
